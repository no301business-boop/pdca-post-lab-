<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>PDCA Post Lab</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--surface:#15151a;--surface2:#1e1e26;--border:#2a2a36;
  --accent:#e8ff47;--accent2:#ff6b6b;--accent3:#5be3b6;--text:#e8e8f0;
  --muted:#6b6b80;--font-d:'Helvetica Neue',Arial,sans-serif;--font-m:'Courier New',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-d);}
.app{display:flex;flex-direction:column;min-height:100vh;}
.header{background:var(--surface);border-bottom:2px solid var(--accent);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.logo{font-size:16px;font-weight:800;letter-spacing:.1em;color:var(--accent);}
.header-btns{display:flex;gap:8px;align-items:center;}
.save-badge{font-size:11px;font-family:var(--font-m);padding:3px 10px;border-radius:20px;background:rgba(91,227,182,.15);color:var(--accent3);}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;}
.tab{padding:12px 20px;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.content{flex:1;padding:16px;overflow-y:auto;}
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card:nth-child(1)::before{background:var(--accent);}
.stat-card:nth-child(2)::before{background:var(--accent3);}
.stat-card:nth-child(3)::before{background:var(--accent2);}
.stat-card:nth-child(4)::before{background:#a78bfa;}
.stat-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.stat-value{font-family:var(--font-m);font-size:22px;font-weight:700;}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.post-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.post-card:hover{border-color:var(--accent);}
.post-card-top{display:flex;gap:10px;align-items:flex-start;}
.post-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;}
.post-thumb-ph{width:48px;height:48px;border-radius:8px;background:var(--surface2);border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.post-info{flex:1;min-width:0;}
.post-hook{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.post-purpose{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.post-meta{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;font-family:var(--font-m);}
.tag-weekday{background:rgba(91,227,182,.15);color:var(--accent3);}
.tag-holiday{background:rgba(255,107,107,.15);color:var(--accent2);}
.tag-morning{background:rgba(232,255,71,.12);color:var(--accent);}
.tag-evening{background:rgba(167,139,250,.15);color:#a78bfa;}
.tag-noon{background:rgba(255,165,0,.15);color:orange;}
.post-nums{display:flex;gap:12px;margin-left:auto;}
.post-num{font-family:var(--font-m);font-size:12px;}
.post-num span{color:var(--muted);font-size:10px;}
.high{color:var(--accent3);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;font-family:var(--font-d);}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:#d4eb00;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--text);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-danger{background:transparent;color:var(--accent2);border:1px solid var(--accent2);font-size:12px;padding:5px 12px;}
.btn-export{background:rgba(232,255,71,.1);color:var(--accent);border:1px solid var(--accent);font-size:12px;padding:5px 12px;}
.fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#000;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;box-shadow:0 4px 20px rgba(232,255,71,.3);z-index:20;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.modal-header{padding:16px 20px 0;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:17px;font-weight:800;}
.modal-body{padding:16px 20px 32px;}
.close-btn{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;padding:4px;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.form-label{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;}
.form-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:var(--font-m);font-size:14px;outline:none;width:100%;transition:border-color .15s;-webkit-appearance:none;}
.form-input:focus{border-color:var(--accent);}
textarea.form-input{resize:vertical;min-height:72px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sec-label{font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;margin:18px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.img-upload-box{border:1.5px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;position:relative;background:var(--surface2);}
.img-upload-box input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}
.img-preview{width:100%;max-height:160px;object-fit:contain;border-radius:8px;}
.upload-hint{font-size:12px;color:var(--muted);margin-top:6px;}
.detail-section{background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:12px;}
.detail-section h4{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.kv{display:flex;flex-direction:column;gap:8px;}
.kv-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;}
.kv-key{color:var(--muted);}
.kv-val{font-family:var(--font-m);}
.detail-img{width:100%;border-radius:8px;object-fit:contain;max-height:200px;border:1px solid var(--border);}
.hyp-box{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 14px;font-size:13px;line-height:1.7;margin-bottom:14px;}
.detail-actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.analytics-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.analytics-card h3{font-size:13px;font-weight:700;margin-bottom:14px;}
.bar-row{margin-bottom:12px;}
.bar-label-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;}
.bar-bg{height:8px;background:var(--border);border-radius:4px;}
.bar-fill{height:8px;border-radius:4px;background:var(--accent3);transition:width .4s;}
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty h3{font-size:16px;color:var(--text);margin-bottom:6px;}
.empty p{font-size:13px;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;color:var(--muted);font-size:13px;}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.search-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;width:100%;margin-bottom:12px;-webkit-appearance:none;}
.search-box:focus{border-color:var(--accent);}
.filter-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px;}
.filter-chip{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.filter-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.08);}
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <span>読み込み中…</span>
  </div>
</div>
<button class="fab" onclick="openForm(null)">＋</button>
<script>
const SUPABASE_URL = 'https://byjxjzaiyalxjuftqkut.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mW1SEDi5JqR2WZoW5bpFAw_6Q7Otuq4';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const WEEKDAYS = ["日","月","火","水","木","金","土"];
const getWD = (d) => { if(!d) return {label:"–",isHoliday:false}; const w=new Date(d).getDay(); return {label:WEEKDAYS[w]+"曜",isHoliday:w===0||w===6}; };
const getTS = (t) => { if(!t) return null; const h=parseInt(t); if(h>=5&&h<12) return {label:"朝",cls:"tag-morning"}; if(h>=12&&h<17) return {label:"昼",cls:"tag-noon"}; return {label:"夜",cls:"tag-evening"}; };
const engRate = (l,i) => (!i||+i===0)?"0.00":((+l/+i)*100).toFixed(2);
const fmt = (n) => +n>=10000?((+n)/10000).toFixed(1)+"万":(+n||0).toLocaleString();
const esc = (s) => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';

let posts = [];
let currentTab = 'list';
let currentFilter = 'all';
let searchQuery = '';
let saveTimer = null;

async function loadPosts() {
  const { data, error } = await db.from('posts').select('*').order('created_at', { ascending: false });
  if (error) { console.error(error); return []; }
  return data || [];
}

async function savePost(post) {
  showSaveBadge('保存中…');
  const row = {
    purpose: post.purpose||null, date: post.date||null, time: post.time||null,
    likes: +post.likes||0, impressions: +post.impressions||0,
    hook: post.hook||null, ending: post.ending||null,
    ttp_img: post.ttp_img||null, my_img: post.my_img||null, notes: post.notes||null
  };
  let error;
  if (post.id) {
    ({ error } = await db.from('posts').update(row).eq('id', post.id));
  } else {
    ({ error } = await db.from('posts').insert(row));
  }
  if (error) { showSaveBadge('⚠ 保存失敗'); return false; }
  showSaveBadge('✓ 保存済');
  return true;
}

async function deletePost(id) {
  const { error } = await db.from('posts').delete().eq('id', id);
  return !error;
}

function showSaveBadge(msg) {
  const el = document.getElementById('save-badge');
  if (!el) return;
  el.textContent = msg;
  el.style.display = 'inline-block';
  clearTimeout(saveTimer);
  if (msg === '✓ 保存済') saveTimer = setTimeout(() => { el.style.display='none'; }, 2500);
}

function render() {
  document.getElementById('app').innerHTML = `
    <div class="app">
      <div class="header">
        <div class="logo">📊 PDCA Post Lab</div>
        <div class="header-btns">
          <span id="save-badge" class="save-badge" style="display:none"></span>
        </div>
      </div>
      <div class="tabs">
        <div class="tab ${currentTab==='list'?'active':''}" onclick="switchTab('list')">📋 投稿一覧</div>
        <div class="tab ${currentTab==='analytics'?'active':''}" onclick="switchTab('analytics')">📈 分析</div>
      </div>
      <div class="content" id="main-content">
        ${currentTab==='list' ? renderList() : renderAnalytics()}
      </div>
    </div>
    <button class="fab" onclick="openForm(null)">＋</button>
  `;
}

function renderList() {
  const filtered = getFiltered();
  const totalLikes = posts.reduce((s,p)=>s+(+p.likes||0),0);
  const totalImp = posts.reduce((s,p)=>s+(+p.impressions||0),0);
  const avgEr = posts.length ? (posts.reduce((s,p)=>s+parseFloat(engRate(p.likes,p.impressions)),0)/posts.length).toFixed(2) : '0.00';
  return `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">総投稿数</div><div class="stat-value">${posts.length}</div><div class="stat-sub">記録済み</div></div>
      <div class="stat-card"><div class="stat-label">総いいね</div><div class="stat-value">${fmt(totalLikes)}</div><div class="stat-sub">累計</div></div>
      <div class="stat-card"><div class="stat-label">総インプ</div><div class="stat-value">${fmt(totalImp)}</div><div class="stat-sub">累計</div></div>
      <div class="stat-card"><div class="stat-label">平均エンゲ率</div><div class="stat-value">${avgEr}%</div><div class="stat-sub">いいね/インプ</div></div>
    </div>
    <input class="search-box" placeholder="🔍 フック・目的・メモで検索" value="${esc(searchQuery)}" oninput="onSearch(this.value)"/>
    <div class="filter-row">
      ${['all','morning','evening','weekday','holiday'].map(f=>`
        <button class="filter-chip ${currentFilter===f?'active':''}" onclick="setFilter('${f}')">
          ${f==='all'?'すべて':f==='morning'?'朝':f==='evening'?'夜':f==='weekday'?'平日':'休日'}
        </button>`).join('')}
    </div>
    ${filtered.length===0
      ? `<div class="empty"><div class="empty-icon">📭</div><h3>投稿がありません</h3><p>右下の＋から追加してください</p></div>`
      : filtered.map(p => renderPostCard(p)).join('')}
  `;
}

function renderPostCard(p) {
  const wd=getWD(p.date), ts=getTS(p.time), rate=engRate(p.likes,p.impressions);
  return `
    <div class="post-card" onclick="openDetail('${p.id}')">
      <div class="post-card-top">
        ${p.my_img ? `<img class="post-thumb" src="${esc(p.my_img)}" alt=""/>` : `<div class="post-thumb-ph">📸</div>`}
        <div class="post-info">
          <div class="post-hook">${esc(p.hook)||'フック未記入'}</div>
          <div class="post-purpose">${esc(p.purpose)||'目的未記入'}</div>
        </div>
      </div>
      <div class="post-meta">
        <span class="tag ${wd.isHoliday?'tag-holiday':'tag-weekday'}">${wd.label}</span>
        ${ts?`<span class="tag ${ts.cls}">${ts.label} ${esc(p.time)}</span>`:''}
        <div class="post-nums">
          <div class="post-num high">${fmt(p.likes)}<span> いいね</span></div>
          <div class="post-num">${rate}%<span> ER</span></div>
        </div>
      </div>
    </div>`;
}

function renderAnalytics() {
  const slotData = ['朝','昼','夜'].map((s,i)=>({label:s,cls:['tag-morning','tag-noon','tag-evening'][i],posts:posts.filter(p=>getTS(p.time)?.label===s)}));
  const wdData = [
    {label:'平日',cls:'tag-weekday',posts:posts.filter(p=>!getWD(p.date).isHoliday)},
    {label:'休日',cls:'tag-holiday',posts:posts.filter(p=>getWD(p.date).isHoliday)},
  ];
  const topPost = posts.length ? posts.reduce((a,b)=>(+a.likes||0)>(+b.likes||0)?a:b) : null;
  const barHtml = (items) => {
    const vals = items.map(({posts:g})=>g.length?Math.round(g.reduce((s,p)=>s+(+p.likes||0),0)/g.length):0);
    const mx = Math.max(...vals,1);
    return items.map(({label,cls,posts:g},i)=>`
      <div class="bar-row">
        <div class="bar-label-row">
          <span class="tag ${cls}">${label}</span>
          <span style="font-family:var(--font-m)">${fmt(vals[i])} <span style="color:var(--muted);font-size:10px">(${g.length}件)</span></span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${(vals[i]/mx)*100}%"></div></div>
      </div>`).join('');
  };
  return `
    ${posts.length===0?`<div class="empty"><div class="empty-icon">📈</div><h3>データがありません</h3><p>投稿を追加すると分析できます</p></div>`:''}
    <div class="analytics-card"><h3>⏰ 時間帯別 平均いいね</h3>${barHtml(slotData)}</div>
    <div class="analytics-card"><h3>📅 平日 vs 休日</h3>${barHtml(wdData)}</div>
    ${topPost?`
    <div class="analytics-card">
      <h3>🏆 ベスト投稿</h3>
      ${topPost.my_img?`<img src="${esc(topPost.my_img)}" style="width:100%;max-height:180px;object-fit:contain;border-radius:8px;margin-bottom:10px;border:1px solid var(--border)"/>`:''}
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">${esc(topPost.hook)||'–'}</div>
      <div style="display:flex;gap:20px;margin-top:10px">
        <div><div style="font-size:10px;color:var(--muted)">いいね</div><div style="font-family:var(--font-m);font-size:20px;color:var(--accent3)">${fmt(topPost.likes)}</div></div>
        <div><div style="font-size:10px;color:var(--muted)">インプ</div><div style="font-family:var(--font-m);font-size:20px">${fmt(topPost.impressions)}</div></div>
        <div><div style="font-size:10px;color:var(--muted)">エンゲ率</div><div style="font-family:var(--font-m);font-size:20px;color:var(--accent)">${engRate(topPost.likes,topPost.impressions)}%</div></div>
      </div>
    </div>`:''}`;
}

function openDetail(id) {
  const p = posts.find(x=>x.id===id);
  if (!p) return;
  const wd=getWD(p.date), ts=getTS(p.time), rate=engRate(p.likes,p.impressions);
  document.body.insertAdjacentHTML('beforeend', `
    <div class="overlay" id="overlay" onclick="closeOverlayIfBg(event)">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <span class="modal-title">投稿詳細</span>
          <button class="close-btn" onclick="closeOverlay()">×</button>
        </div>
        <div class="modal-body">
          <div class="detail-actions">
            <button class="btn btn-export btn-sm" onclick="exportImage('${id}')">📱 画像で保存</button>
            <button class="btn btn-ghost btn-sm" onclick="openForm('${id}')">編集</button>
            <button class="btn btn-danger btn-sm" onclick="confirmDelete('${id}')">削除</button>
          </div>
          <div class="hyp-box">🎯 ${esc(p.purpose)||'検証目的 未記入'}</div>
          <div class="detail-section">
            <h4>📊 パフォーマンス</h4>
            <div class="kv">
              <div class="kv-row"><span class="kv-key">いいね</span><span class="kv-val high">${fmt(p.likes)}</span></div>
              <div class="kv-row"><span class="kv-key">インプ</span><span class="kv-val">${fmt(p.impressions)}</span></div>
              <div class="kv-row"><span class="kv-key">エンゲ率</span><span class="kv-val">${rate}%</span></div>
              <div class="kv-row"><span class="kv-key">投稿日</span><span><span class="tag ${wd.isHoliday?'tag-holiday':'tag-weekday'}">${wd.label}</span> ${esc(p.date)}</span></div>
              <div class="kv-row"><span class="kv-key">時間帯</span><span>${ts?`<span class="tag ${ts.cls}">${ts.label}</span> `:''}${esc(p.time)}</span></div>
            </div>
          </div>
          <div class="detail-section">
            <h4>✍️ 文章構造</h4>
            <div style="margin-bottom:10px"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:5px">⑧ フック</div><div style="font-size:13px;line-height:1.6">${esc(p.hook)||'–'}</div></div>
            <div style="height:1px;background:var(--border);margin:8px 0"></div>
            <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:5px">⑨ 文末 CTA</div><div style="font-size:13px;font-family:var(--font-m);color:var(--accent3)">${esc(p.ending)||'–'}</div></div>
          </div>
          ${p.ttp_img?`<div class="detail-section"><h4>② TTP元スクショ</h4><img src="${esc(p.ttp_img)}" class="detail-img" alt=""/></div>`:''}
          ${p.my_img?`<div class="detail-section"><h4>③ 自分の投稿スクショ</h4><img src="${esc(p.my_img)}" class="detail-img" alt=""/></div>`:''}
          ${p.notes?`<div class="detail-section"><h4>💡 メモ・気づき</h4><p style="font-size:13px;line-height:1.75">${esc(p.notes)}</p></div>`:''}
        </div>
      </div>
    </div>`);
}

function openForm(id) {
  closeOverlay();
  const p = id ? posts.find(x=>x.id===id) : null;
  const v = (k) => esc(p?.[k]||'');
  document.body.insertAdjacentHTML('beforeend', `
    <div class="overlay" id="overlay" onclick="closeOverlayIfBg(event)">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <span class="modal-title">${p?'投稿を編集':'投稿を追加'}</span>
          <button class="close-btn" onclick="closeOverlay()">×</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="f-id" value="${p?.id||''}"/>
          <div class="sec-label">① 検証目的</div>
          <div class="form-group"><label class="form-label">この投稿で何を検証するか</label><textarea class="form-input" id="f-purpose" placeholder="例：競合Aのフック構造をTTPして反応を見る">${v('purpose')}</textarea></div>
          <div class="sec-label">② TTP元スクショ</div>
          <div class="form-group">
            <div class="img-upload-box" onclick="triggerUpload('f-ttp')">
              <input type="file" id="f-ttp" accept="image/*" onchange="previewImg(this,'ttp-preview')" style="display:none"/>
              <div id="ttp-preview">${p?.ttp_img?`<img src="${esc(p.ttp_img)}" class="img-preview"/>`:'<div style="font-size:28px">📷</div><div class="upload-hint">タップして選択</div>'}</div>
            </div>
          </div>
          <div class="sec-label">③ 自身の投稿スクショ</div>
          <div class="form-group">
            <div class="img-upload-box" onclick="triggerUpload('f-my')">
              <input type="file" id="f-my" accept="image/*" onchange="previewImg(this,'my-preview')" style="display:none"/>
              <div id="my-preview">${p?.my_img?`<img src="${esc(p.my_img)}" class="img-preview"/>`:'<div style="font-size:28px">📷</div><div class="upload-hint">タップして選択</div>'}</div>
            </div>
          </div>
          <div class="sec-label">④–⑦ 投稿データ</div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">④ いいね数</label><input class="form-input" type="number" id="f-likes" min="0" placeholder="1200" value="${v('likes')}"/></div>
            <div class="form-group"><label class="form-label">⑤ インプ数</label><input class="form-input" type="number" id="f-imp" min="0" placeholder="28000" value="${v('impressions')}"/></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">⑥ 投稿日</label><input class="form-input" type="date" id="f-date" value="${v('date')}"/></div>
            <div class="form-group"><label class="form-label">⑦ 投稿時間</label><input class="form-input" type="time" id="f-time" value="${v('time')}"/></div>
          </div>
          <div class="sec-label">⑧–⑨ 文章構造</div>
          <div class="form-group"><label class="form-label">⑧ フック（1行目）</label><input class="form-input" type="text" id="f-hook" placeholder="例：朝5時に起きると人生が変わる理由を話します" value="${v('hook')}"/></div>
          <div class="form-group"><label class="form-label">⑨ 文末 CTA</label><input class="form-input" type="text" id="f-ending" placeholder="例：→ 保存で後から見返せます" value="${v('ending')}"/></div>
          <div class="form-group"><label class="form-label">メモ・気づき</label><textarea class="form-input" id="f-notes" placeholder="検証結果や気づきを残す">${v('notes')}</textarea></div>
          <div style="display:flex;gap:10px;margin-top:8px">
            <button class="btn btn-ghost" style="flex:1" onclick="closeOverlay()">キャンセル</button>
            <button class="btn btn-primary" style="flex:2" onclick="submitForm()">保存する</button>
          </div>
        </div>
      </div>
    </div>`);
  if (p) {
    document.getElementById('f-ttp')._existing = p.ttp_img||null;
    document.getElementById('f-my')._existing = p.my_img||null;
  }
}

function triggerUpload(id) { document.getElementById(id).click(); }

function previewImg(input, previewId) {
  const f = input.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = (e) => {
    input._b64 = e.target.result;
    document.getElementById(previewId).innerHTML = `<img src="${e.target.result}" class="img-preview"/>`;
  };
  r.readAsDataURL(f);
}

async function submitForm() {
  const ttpInput = document.getElementById('f-ttp');
  const myInput  = document.getElementById('f-my');
  const post = {
    id: document.getElementById('f-id').value || null,
    purpose: document.getElementById('f-purpose').value,
    date: document.getElementById('f-date').value,
    time: document.getElementById('f-time').value,
    likes: document.getElementById('f-likes').value,
    impressions: document.getElementById('f-imp').value,
    hook: document.getElementById('f-hook').value,
    ending: document.getElementById('f-ending').value,
    notes: document.getElementById('f-notes').value,
    ttp_img: ttpInput._b64 || ttpInput._existing || null,
    my_img: myInput._b64 || myInput._existing || null,
  };
  const ok = await savePost(post);
  if (ok) { closeOverlay(); posts = await loadPosts(); render(); }
}

async function confirmDelete(id) {
  if (!confirm('この投稿を削除しますか？')) return;
  const ok = await deletePost(id);
  if (ok) { closeOverlay(); posts = await loadPosts(); render(); }
}

async function exportImage(id) {
  const p = posts.find(x=>x.id===id);
  if (!p) return;
  const W=1080,H=1920;
  const canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  const c=canvas.getContext('2d');
  const rr=(x,y,w,h,r)=>{c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();c.fill();};
  const wt=(text,x,y,maxW,lh,max)=>{if(!text)return;const chars=[...text];let line='',n=0;for(let i=0;i<chars.length;i++){const t=line+chars[i];if(c.measureText(t).width>maxW&&line){c.fillText(line,x,y+n*lh);line=chars[i];n++;if(n>=max){c.fillText(line+'…',x,y+n*lh);return;}}else{line=t;}}if(line)c.fillText(line,x,y+n*lh);};
  const loadImg=(src)=>new Promise(res=>{if(!src)return res(null);const img=new Image();img.onload=()=>res(img);img.onerror=()=>res(null);img.src=src;});
  c.fillStyle='#0d0d0f';c.fillRect(0,0,W,H);
  c.fillStyle='#15151a';c.fillRect(0,0,W,120);
  c.fillStyle='#e8ff47';c.fillRect(0,0,W,4);
  c.font='bold 40px sans-serif';c.fillStyle='#e8ff47';c.fillText('PDCA POST LAB',60,78);
  c.font='28px monospace';c.fillStyle='#6b6b80';c.fillText(p.date||'',W-60-c.measureText(p.date||'').width,78);
  c.fillStyle='#1e1e26';rr(48,148,W-96,160,20);c.fillStyle='#e8ff47';c.fillRect(48,148,6,160);
  c.font='bold 28px sans-serif';c.fillStyle='#e8ff47';c.fillText('① 検証目的',80,198);
  c.font='32px sans-serif';c.fillStyle='#e8e8f0';wt(p.purpose||'未記入',80,242,W-160,42,2);
  const scores=[{l:'いいね',v:fmt(p.likes),col:'#5be3b6'},{l:'インプ',v:fmt(p.impressions),col:'#e8e8f0'},{l:'エンゲ率',v:engRate(p.likes,p.impressions)+'%',col:'#e8ff47'}];
  const sw=(W-96-32)/3;
  scores.forEach((s,i)=>{const sx=48+i*(sw+16);c.fillStyle='#15151a';rr(sx,340,sw,180,16);c.fillStyle=s.col;c.fillRect(sx,340,sw,4);c.font='bold 24px sans-serif';c.fillStyle='#6b6b80';c.fillText(s.l,sx+24,400);c.font='bold 56px monospace';c.fillStyle=s.col;c.fillText(s.v,sx+24,472);});
  const wd=getWD(p.date),ts=getTS(p.time);
  c.fillStyle='#15151a';rr(48,552,W-96,100,16);
  c.font='32px monospace';c.fillStyle=wd.isHoliday?'#ff6b6b':'#5be3b6';c.fillText(wd.label,80,614);
  c.fillStyle='#e8e8f0';c.fillText(' '+(p.date||''),160,614);
  if(ts){const tc=ts.label==='朝'?'#e8ff47':ts.label==='昼'?'orange':'#a78bfa';c.fillStyle=tc;c.fillText('  '+ts.label+' '+(p.time||''),420,614);}
  c.fillStyle='#1e1e26';rr(48,684,W-96,200,20);c.fillStyle='#5be3b6';c.fillRect(48,684,6,200);
  c.font='bold 28px sans-serif';c.fillStyle='#5be3b6';c.fillText('⑧ フック（1行目）',80,730);
  c.font='34px sans-serif';c.fillStyle='#e8e8f0';wt(p.hook||'–',80,778,W-160,44,2);
  c.fillStyle='#1e1e26';rr(48,916,W-96,160,20);c.fillStyle='#a78bfa';c.fillRect(48,916,6,160);
  c.font='bold 28px sans-serif';c.fillStyle='#a78bfa';c.fillText('⑨ 文末 CTA',80,962);
  c.font='32px monospace';c.fillStyle='#e8e8f0';wt(p.ending||'–',80,1006,W-160,40,2);
  const imgY=1108,imgH=460,imgW=(W-96-24)/2;
  const [ti,mi]=await Promise.all([loadImg(p.ttp_img),loadImg(p.my_img)]);
  const drawIC=(img,label,x)=>{c.fillStyle='#15151a';rr(x,imgY,imgW,imgH+56,16);c.font='bold 24px sans-serif';c.fillStyle='#6b6b80';c.fillText(label,x+16,imgY+42);if(img){c.save();c.beginPath();rr(x,imgY+52,imgW,imgH,12);c.clip();const sc=Math.min(imgW/img.width,imgH/img.height);const dw=img.width*sc,dh=img.height*sc;c.drawImage(img,x+(imgW-dw)/2,imgY+52+(imgH-dh)/2,dw,dh);c.restore();}else{c.font='48px sans-serif';c.fillStyle='#2a2a36';c.fillText('📷',x+imgW/2-30,imgY+52+imgH/2+16);}};
  drawIC(ti,'② TTP元',48);
  drawIC(mi,'③ 自分の投稿',48+imgW+24);
  if(p.notes){c.fillStyle='#1e1e26';rr(48,1700,W-96,180,20);c.fillStyle='#ff6b6b';c.fillRect(48,1700,6,180);c.font='bold 28px sans-serif';c.fillStyle='#ff6b6b';c.fillText('💡 メモ・気づき',80,1748);c.font='28px sans-serif';c.fillStyle='#e8e8f0';wt(p.notes,80,1792,W-160,38,3);}
  c.fillStyle='#1e1e26';c.fillRect(0,H-56,W,56);
  c.font='22px monospace';c.fillStyle='#2a2a36';c.fillText('PDCA Post Lab',60,H-20);
  const dataUrl=canvas.toDataURL('image/png');
  const win=window.open('','_blank');
  if(win){win.document.write(`<html><head><title>投稿カード</title><meta name="viewport" content="width=device-width"/><style>body{margin:0;background:#000;display:flex;justify-content:center;}img{max-width:100%;height:auto;}</style></head><body><img src="${dataUrl}"/></body></html>`);win.document.close();}
}

function switchTab(tab){currentTab=tab;render();}
function setFilter(f){currentFilter=f;document.getElementById('main-content').innerHTML=renderList();}
function onSearch(q){searchQuery=q;document.getElementById('main-content').innerHTML=renderList();}
function getFiltered(){return posts.filter(p=>{const q=searchQuery.toLowerCase();const ok=!q||[p.hook,p.purpose,p.notes].some(s=>s?.toLowerCase().includes(q));const ts=getTS(p.time),wd=getWD(p.date);if(currentFilter==='morning')return ok&&ts?.label==='朝';if(currentFilter==='evening')return ok&&ts?.label==='夜';if(currentFilter==='weekday')return ok&&!wd.isHoliday;if(currentFilter==='holiday')return ok&&wd.isHoliday;return ok;});}
function closeOverlay(){document.getElementById('overlay')?.remove();}
function closeOverlayIfBg(e){if(e.target.id==='overlay')closeOverlay();}

(async()=>{
  posts = await loadPosts();
  render();
})();
</script>
